<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>


         body {
            background: linear-gradient(135deg, #83c5be, #064789);
            color: #fefae0;
        }

        .custom-navbar {
            background-color: #83c5be !important;
            border-bottom: 3px solid #006d77; 
        }

        .custom-navbar .navbar-brand {
            color: #064789 !important;
            font-weight: 700;
        }

        .custom-navbar .nav-link {
            color: #fefae0 !important; 
            transition: color 0.2s ease-in-out;
        }

        .custom-navbar .nav-link:hover, 
        .custom-navbar .nav-link.active {
            color: #064789 !important;
        }

        .custom-nordic-header {
            background-color: #ebf2fa !important; 
            color: #242322 !important;
        }

        .custom-nordic-header h1 {
            color: #064789 !important; 
        }

        .custom-sidebar-accent {
            border-top: 4px solid #064789 !important; 
        }

        code {
            color: #064789 !important;
            font-weight: 600;
            background-color: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
        }

            #footer-anchor-target {
            background-color: #83c5be !important;
            color: #064789 !important;
            padding: 3rem 1rem;
            text-align: center;
            margin-top: 4rem;
        }

        

        .login-card {
            background-color: rgba(6, 46, 78, 0.151);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-md navbar-dark custom-navbar shadow-sm sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">
             <i class="bi bi-cake-fill me-2"></i>Nathan's Sugarland
            </a>

            <button class="navbar-toggler border-0" type="button" 
                 data-bs-toggle="collapse" 
                 data-bs-target="#mainDepartmentNavbar" 
                 aria-controls="mainDepartmentNavbar" 
                 aria-expanded="false" 
                 aria-label="Toggle navigation">
                 <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainDepartmentNavbar">
                 <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                     <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                     <li class="nav-item"><a class="nav-link" href="About-us.html">About us</a></li>
                     <li class="nav-item"><a class="nav-link" href="Menu.html">Menu</a></li>
                     <li class="nav-item"><a class="nav-link active" aria-current="page" href="Sign-Up.html">login</a></li>
                 </ul>
            </div>
        </div>
    </nav>

  <div class="container d-flex justify-content-center align-items-center my-5" style="min-height: 50vh;">
    <div class="login-card">
        <h2 class="text-center mb-5">Login</h2>
        
        <form action="#" method="POST">
            <div class="form-floating mb-4">
                <input type="email" class="form-control form-control-lg text-dark" id="emailInput" placeholder="Enter Username" required>
                <label for="emailInput" class="text-dark">Username</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control form-control-lg text-dark" id="passwordInput" placeholder="Enter Password" required>
                <label for="passwordInput" class="text-dark">Password</label>
            </div>

            <div class="mb-4 form-check">
                <input class="form-check-input" type="checkbox" id="terms" checked required>
                <label class="form-check-label small text-white-50" for="terms">
                    Keep me Logged in on This Device.
                </label>
            </div>

            <ul>
                <li>
                    <a href="Register.html" class="text-warning">Don't have an account? Register here.</a>
                </li>
            </ul>

            <button type="submit" class="btn btn-success w-100 btn-lg mt-2">Log In</button>
        </form>
    </div>
  </div>




    <footer id="footer-anchor-target">
        <h4>Nathan's Sugarland</h4>

        <p style="width:60%; margin:0 auto; text-align:center;"><strong>
            Making every celebration sweeter since 2025.
        </strong></p>

        <hr>

        <p>
            © 2026 Nathan's Sugarland. All Rights Reserved.
        </p>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
